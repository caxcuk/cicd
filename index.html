<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Правильное задание</title>
</head>
<body>
<h1 id="header">Тестовая страница</h1>
<form id="myForm">
    <label for="nameInput">Введите имя:</label>
    <input type="text" id="nameInput" required>
    <button type="button" id="submitBtn" onclick="showMessage()">Отправить</button>
</form>
<p id="resultMessage"></p>
<script>
    function showMessage() {
        const name = document.getElementById('nameInput').value;
        if (name) document.getElementById('resultMessage').innerText = `Привет, ${name}!`;
    }
</script>
</body>
</html>
